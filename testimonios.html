<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonios</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: white; color: #1a1a1a; }
  .header { text-align: center; padding: 2.5rem 1rem 1.5rem; }
  .header h2 { font-size: 28px; font-weight: 700; margin-bottom: 0.75rem; }
  .header p { font-size: 15px; color: #555; max-width: 520px; margin: 0 auto; line-height: 1.6; }
  .contenedor { position: relative; padding: 0 1rem 2rem; overflow: hidden; }
  .track-wrapper { overflow: hidden; }
  .track { display: flex; gap: 16px; transition: transform 0.4s ease; }
  .tarjeta {
    min-width: calc(33.333% - 11px);
    background: #f7f7f5;
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    flex-shrink: 0;
  }
  .estrellas { color: #f59e0b; font-size: 18px; letter-spacing: 2px; }
  .cita { font-size: 14px; line-height: 1.7; color: #333; flex: 1; }
  .persona {
    display: flex; align-items: center; gap: 10px;
    margin-top: 0.5rem; padding-top: 0.75rem;
    border-top: 0.5px solid rgba(0,0,0,0.08);
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #e0ddd5; display: flex; align-items: center;
    justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .persona-nombre { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .persona-estado { font-size: 12px; color: #888; }
  .dim-badge {
    display: inline-block; padding: 2px 10px;
    border-radius: 99px; font-size: 11px; font-weight: 500; width: fit-content;
  }
  .dim-salud    { background: #EAF3FC; color: #1a5fa8; }
  .dim-alim     { background: #EAF3DE; color: #3B6D11; }
  .dim-vivienda { background: #FEF3E2; color: #a05c00; }
  .dim-general  { background: #F1EFE8; color: #5F5E5A; }
  .controles { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 1.5rem; }
  .btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.15); background: white;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn:hover { background: #F1EFE8; }
  .dots { display: flex; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #ddd; cursor: pointer; transition: background 0.2s; }
  .dot.active { background: #1a1a1a; }
  .nota { font-size: 11px; color: #aaa; text-align: center; padding: 0 1rem 1.5rem; line-height: 1.5; }
  @media (max-width: 600px) { .tarjeta { min-width: 100%; } }
</style>
</head>
<body>

<div class="header">
  <h2>Testimonios</h2>
  <p>Más allá de las cifras y los debates políticos, este programa también se vive en la experiencia cotidiana de quienes interactúan con él. Estas son algunas de sus voces.</p>
</div>

<div class="contenedor">
  <div class="track-wrapper">
    <div class="track" id="track"></div>
  </div>
</div>

<div class="controles">
  <button class="btn" id="prev">&#8592;</button>
  <div class="dots" id="dots"></div>
  <button class="btn" id="next">&#8594;</button>
</div>

<p class="nota">Testimonios recopilados mediante formulario escrito. Nombres modificados para proteger la identidad.</p>

<script>
const testimonios = [
  {
    dim: "alim", dimLabel: "Alimentación",
    cita: "Desde que recibo la pensión ya no tengo que trabajar para poder comer. A mis 80 años eso vale mucho.",
    nombre: "Juan R.", estado: "Nuevo León", emoji: "👴"
  },
  {
    dim: "general", dimLabel: "Percepción general",
    cita: "Antes vivía con miedo de quedarme sin nada. Ahora sé que cada dos meses algo llega. No es mucho, pero es seguro.",
    nombre: "María G.", estado: "Oaxaca", emoji: "👵"
  },
  {
    dim: "alim", dimLabel: "Alimentación",
    cita: "Con la pensión ya puedo comprar leche y fruta sin tener que escoger entre eso o el gas. Eso para mí es mucho.",
    nombre: "Roberto S.", estado: "Veracruz", emoji: "👴"
  },
  {
    dim: "salud", dimLabel: "Salud",
    cita: "El doctor ya no está tan cerca como antes. A veces camino mucho para que me atiendan. Eso no ha mejorado.",
    nombre: "Esperanza L.", estado: "Chiapas", emoji: "👵"
  },
  {
    dim: "vivienda", dimLabel: "Vivienda",
    cita: "Con lo que juntamos en la familia pudimos poner piso de cemento. La pensión ayudó a que alcanzara el dinero.",
    nombre: "José M.", estado: "Guerrero", emoji: "👴"
  },
  {
    dim: "general", dimLabel: "Percepción general",
    cita: "Quisiera que el monto fuera más. Con lo que sube todo, a veces no alcanza como antes. Pero agradezco que exista.",
    nombre: "Carmen R.", estado: "Puebla", emoji: "👵"
  },
  {
    dim: "salud", dimLabel: "Salud",
    cita: "Me cambiaron de médico tres veces en dos años. No sé bien a qué programa pertenezco ahora. Eso me preocupa.",
    nombre: "Aurelio T.", estado: "Ciudad de México", emoji: "👴"
  }
];

const dimClass = { salud:"dim-salud", alim:"dim-alim", vivienda:"dim-vivienda", general:"dim-general" };
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');
let current = 0;
const visible = window.innerWidth <= 600 ? 1 : 3;
const total = Math.ceil(testimonios.length / visible);

testimonios.forEach(t => {
  const card = document.createElement('div');
  card.className = 'tarjeta';
  card.innerHTML = `
    <span class="dim-badge ${dimClass[t.dim]}">${t.dimLabel}</span>
    <div class="estrellas">★★★★★</div>
    <p class="cita">"${t.cita}"</p>
    <div class="persona">
      <div class="avatar">${t.emoji}</div>
      <div>
        <div class="persona-nombre">${t.nombre}</div>
        <div class="persona-estado">${t.estado}</div>
      </div>
    </div>
  `;
  track.appendChild(card);
});

for (let i = 0; i < total; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
}

function goTo(n) {
  current = (n + total) % total;
  const cardWidth = track.children[0].offsetWidth + 16;
  track.style.transform = `translateX(-${current * cardWidth * visible}px)`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
}

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));
setInterval(() => goTo(current + 1), 7000);
</script>
</body>
</html>

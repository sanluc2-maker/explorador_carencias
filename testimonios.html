<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonios</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: white; padding: 1.5rem 1rem; color: #1a1a1a; }

  h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.25rem; color: #1a1a1a; }
  .subtitulo { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

  .carrusel { position: relative; overflow: hidden; }
  .track { display: flex; transition: transform 0.4s ease; }

  .tarjeta {
    min-width: 100%;
    background: white;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .dim-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    width: fit-content;
  }
  .dim-salud    { background: #EAF3FC; color: #1a5fa8; }
  .dim-alim     { background: #EAF3DE; color: #3B6D11; }
  .dim-vivienda { background: #FEF3E2; color: #a05c00; }
  .dim-general  { background: #F1EFE8; color: #5F5E5A; }

  .cita {
    font-size: 16px;
    line-height: 1.6;
    color: #1a1a1a;
    font-style: italic;
    border-left: 3px solid #1a1a1a;
    padding-left: 1rem;
  }

  .persona {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: auto;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #F1EFE8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .persona-info { display: flex; flex-direction: column; }
  .persona-nombre { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .persona-detalle { font-size: 12px; color: #888; }

  .controles {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 1.25rem;
  }
  .btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: white;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn:hover { background: #F1EFE8; }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ddd;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dot.active { background: #1a1a1a; }

  .nota { font-size: 11px; color: #aaa; margin-top: 1rem; line-height: 1.5; }
</style>
</head>
<body>

<h2>Lo que dicen quienes viven la pensión</h2>
<p class="subtitulo">Testimonios recopilados de personas mayores de 65 años beneficiarias de la Pensión para el Bienestar</p>

<div class="carrusel">
  <div class="track" id="track"></div>
</div>

<div class="controles">
  <button class="btn" id="prev">&#8592;</button>
  <div class="dots" id="dots"></div>
  <button class="btn" id="next">&#8594;</button>
</div>

<p class="nota">Testimonios recopilados mediante formulario escrito. Nombres modificados para proteger la identidad. Estado de residencia proporcionado por el participante.</p>

<script>
// ============================================================
// EDITA AQUÍ TUS TESTIMONIOS REALES CUANDO LOS TENGAS
// dim: "salud" | "alim" | "vivienda" | "general"
// emoji: cualquier emoji que represente al participante
// ============================================================
const testimonios = [
  {
    dim: "general",
    dimLabel: "Percepción general",
    cita: "Antes vivía con miedo de quedarme sin nada. Ahora sé que cada dos meses algo llega. No es mucho, pero es seguro.",
    nombre: "María G.",
    detalle: "72 años · Oaxaca",
    emoji: "👵"
  },
  {
    dim: "alim",
    dimLabel: "Alimentación",
    cita: "Con la pensión ya puedo comprar leche y fruta sin tener que escoger entre eso o el gas. Eso para mí es mucho.",
    nombre: "Roberto S.",
    detalle: "68 años · Veracruz",
    emoji: "👴"
  },
  {
    dim: "salud",
    dimLabel: "Salud",
    cita: "El doctor ya no está tan cerca como antes. A veces camino mucho para que me atiendan. Eso no ha mejorado.",
    nombre: "Esperanza L.",
    detalle: "74 años · Chiapas",
    emoji: "👵"
  },
  {
    dim: "vivienda",
    dimLabel: "Vivienda",
    cita: "Con lo que juntamos en la familia pudimos poner piso de cemento. La pensión ayudó a que alcanzara el dinero.",
    nombre: "José M.",
    detalle: "70 años · Guerrero",
    emoji: "👴"
  },
  {
    dim: "general",
    dimLabel: "Percepción general",
    cita: "Quisiera que el monto fuera más. Con lo que sube todo, a veces no alcanza como antes. Pero agradezco que exista.",
    nombre: "Carmen R.",
    detalle: "66 años · Puebla",
    emoji: "👵"
  },
  {
    dim: "salud",
    dimLabel: "Salud",
    cita: "Me cambiaron de médico tres veces en dos años. No sé bien a qué programa pertenezco ahora. Eso me preocupa.",
    nombre: "Aurelio T.",
    detalle: "71 años · Ciudad de México",
    emoji: "👴"
  }
];

const dimClass = { salud:"dim-salud", alim:"dim-alim", vivienda:"dim-vivienda", general:"dim-general" };

const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');
let current = 0;

testimonios.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'tarjeta';
  card.innerHTML = `
    <span class="dim-badge ${dimClass[t.dim]}">${t.dimLabel}</span>
    <p class="cita">"${t.cita}"</p>
    <div class="persona">
      <div class="avatar">${t.emoji}</div>
      <div class="persona-info">
        <span class="persona-nombre">${t.nombre}</span>
        <span class="persona-detalle">${t.detalle}</span>
      </div>
    </div>
  `;
  track.appendChild(card);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(dot);
});

function goTo(n) {
  current = (n + testimonios.length) % testimonios.length;
  track.style.transform = `translateX(-${current * 100}%)`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
}

document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('next').addEventListener('click', () => goTo(current + 1));

// Auto-avance cada 6 segundos
setInterval(() => goTo(current + 1), 6000);
</script>
</body>
</html>

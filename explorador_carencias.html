<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador de carencias por estado</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, sans-serif; background: transparent; padding: 1rem; color: #1a1a1a; }
  select { width: 100%; margin-bottom: 1.25rem; font-size: 15px; padding: 8px 12px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: white; cursor: pointer; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; }
  .header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .header-label { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .dim-card { background: white; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
  .dim-header { display: flex; align-items: center; margin-bottom: 10px; }
  .dim-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .did-chip { margin-left: auto; font-size: 12px; font-weight: 500; padding: 2px 10px; border-radius: 99px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .bar-name { font-size: 12px; color: #888; width: 80px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 20px; background: #F1EFE8; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .bar-val { font-size: 12px; font-weight: 500; min-width: 56px; }
  .dim-desc { font-size: 12px; color: #888; margin-top: 6px; }
  .note { font-size: 11px; color: #aaa; margin-top: 1rem; line-height: 1.5; }
  .select-label { font-size: 13px; color: #888; margin-bottom: 4px; display: block; }
</style>
</head>
<body>

<span class="select-label">Selecciona un estado</span>
<select id="sel"></select>
<div class="header-row">
  <span class="header-label">Valoración general post-2022</span>
  <span class="badge" id="badge-general"></span>
</div>
<div id="panel"></div>
<p class="note">Fuente: ENIGH 2016–2024 (INEGI). Diferencias en diferencias: grupo 65+ vs 60–64. Negativo = mejoró, positivo = empeoró.</p>

<script>
const datos = [
  {cve:"01",nom:"Aguascalientes",salud:0.0156,viv:0.0095,alim:-0.0498},
  {cve:"02",nom:"Baja California",salud:-0.0241,viv:0.011,alim:-0.0964},
  {cve:"03",nom:"Baja California Sur",salud:0.0223,viv:-0.0508,alim:-0.0881},
  {cve:"04",nom:"Campeche",salud:-0.0143,viv:-0.016,alim:-0.016},
  {cve:"05",nom:"Coahuila de Zaragoza",salud:0.0031,viv:0.0064,alim:-0.0197},
  {cve:"06",nom:"Colima",salud:-0.0554,viv:0.0074,alim:-0.0244},
  {cve:"07",nom:"Chiapas",salud:0.0532,viv:-0.0269,alim:-0.0549},
  {cve:"08",nom:"Chihuahua",salud:0.0141,viv:-0.0254,alim:-0.0318},
  {cve:"09",nom:"Ciudad de México",salud:0.0512,viv:0.0009,alim:-0.0242},
  {cve:"10",nom:"Durango",salud:0.0337,viv:-0.0206,alim:-0.0262},
  {cve:"11",nom:"Guanajuato",salud:0.0683,viv:-0.0064,alim:-0.036},
  {cve:"12",nom:"Guerrero",salud:-0.05,viv:-0.0005,alim:-0.0335},
  {cve:"13",nom:"Hidalgo",salud:0.0685,viv:0.0001,alim:-0.0537},
  {cve:"14",nom:"Jalisco",salud:0.0276,viv:-0.0074,alim:-0.0578},
  {cve:"15",nom:"Estado de México",salud:0.0315,viv:-0.0015,alim:-0.01},
  {cve:"16",nom:"Michoacán de Ocampo",salud:-0.0122,viv:-0.0091,alim:-0.0303},
  {cve:"17",nom:"Morelos",salud:-0.0374,viv:-0.0546,alim:-0.058},
  {cve:"18",nom:"Nayarit",salud:0.003,viv:-0.0364,alim:0.0097},
  {cve:"19",nom:"Nuevo León",salud:0.0607,viv:0.0016,alim:-0.013},
  {cve:"20",nom:"Oaxaca",salud:0.0385,viv:-0.0085,alim:-0.0567},
  {cve:"21",nom:"Puebla",salud:0.0219,viv:0.031,alim:-0.0315},
  {cve:"22",nom:"Querétaro",salud:0.0463,viv:-0.0001,alim:-0.0083},
  {cve:"23",nom:"Quintana Roo",salud:0.013,viv:-0.0558,alim:-0.0589},
  {cve:"24",nom:"San Luis Potosí",salud:0.055,viv:0.018,alim:-0.044},
  {cve:"25",nom:"Sinaloa",salud:0.0484,viv:-0.0088,alim:0.0231},
  {cve:"26",nom:"Sonora",salud:0.0714,viv:-0.0256,alim:-0.0119},
  {cve:"27",nom:"Tabasco",salud:-0.0007,viv:-0.0361,alim:-0.0026},
  {cve:"28",nom:"Tamaulipas",salud:0.0739,viv:-0.0184,alim:0.0019},
  {cve:"29",nom:"Tlaxcala",salud:-0.0108,viv:-0.013,alim:-0.0752},
  {cve:"30",nom:"Veracruz",salud:-0.0071,viv:0.0089,alim:-0.0093},
  {cve:"31",nom:"Yucatán",salud:0.005,viv:-0.0212,alim:-0.039},
  {cve:"32",nom:"Zacatecas",salud:0.0369,viv:0.0279,alim:-0.0024}
];

const sel = document.getElementById('sel');
datos.forEach(d => {
  const o = document.createElement('option');
  o.value = d.cve;
  o.textContent = d.nom;
  sel.appendChild(o);
});

function fmt(v) { return (v > 0 ? "+" : "") + (v * 100).toFixed(1) + " pp"; }
function barW(v) { return Math.min(Math.round((Math.abs(v) / 0.1) * 100), 100); }
function barColor(v) { return v > 0.01 ? "#E24B4A" : v < -0.01 ? "#639922" : "#888780"; }
function chipBg(v) { return v > 0.01 ? "#FCEBEB" : v < -0.01 ? "#EAF3DE" : "#F1EFE8"; }
function chipTxt(v) { return v > 0.01 ? "#A32D2D" : v < -0.01 ? "#3B6D11" : "#5F5E5A"; }
function etiqueta(v) { return v > 0.01 ? "empeoró" : v < -0.01 ? "mejoró" : "sin cambio"; }
function desc(v) {
  if (v > 0.01) return "Los 65+ empeoraron relativamente más que el grupo 60–64 después de 2022.";
  if (v < -0.01) return "Los 65+ mejoraron relativamente más que el grupo 60–64 después de 2022.";
  return "No hubo cambio diferencial significativo entre grupos después de 2022.";
}

function dirGeneral(d) {
  const pos = [d.salud > 0.01, d.viv > 0.01, d.alim > 0.01].filter(Boolean).length;
  const neg = [d.salud < -0.01, d.viv < -0.01, d.alim < -0.01].filter(Boolean).length;
  if (neg >= 2 && pos === 0) return {lbl:"mejoró en general", bg:"#EAF3DE", txt:"#3B6D11"};
  if (pos >= 2 && neg === 0) return {lbl:"empeoró en general", bg:"#FCEBEB", txt:"#A32D2D"};
  return {lbl:"resultados mixtos", bg:"#F1EFE8", txt:"#5F5E5A"};
}

function dimCard(label, v) {
  return `
    <div class="dim-card">
      <div class="dim-header">
        <span class="dim-title">${label}</span>
        <span class="did-chip" style="background:${chipBg(v)};color:${chipTxt(v)};">${fmt(v)}</span>
      </div>
      <div class="bar-row">
        <span class="bar-name">Efecto DiD (65+)</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${barW(v)}%;background:${barColor(v)};"></div>
        </div>
        <span class="bar-val" style="color:${barColor(v)};">${etiqueta(v)}</span>
      </div>
      <p class="dim-desc">${desc(v)}</p>
    </div>`;
}

function render(cve) {
  const d = datos.find(x => x.cve === cve);
  const dir = dirGeneral(d);
  const badge = document.getElementById('badge-general');
  badge.textContent = dir.lbl;
  badge.style.background = dir.bg;
  badge.style.color = dir.txt;
  document.getElementById('panel').innerHTML =
    dimCard("Salud", d.salud) +
    dimCard("Vivienda", d.viv) +
    dimCard("Alimentación", d.alim);
}

sel.addEventListener('change', () => render(sel.value));
render("09");
</script>
</body>
</html>

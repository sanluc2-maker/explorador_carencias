// Strip accents for stopword matching
function rmAccents(s){
  return s.normalize('NFD').replace(/[̀-ͯ]/g,'');
}

// Tokenize: keep letters + accented Latin range, strip rest
function tokenize(text){
  return String(text).toLowerCase()
    .replace(/[^a-zà-ɏ\s]/gi,' ')
    .split(/\s+/)
    .filter(function(w){return w.length>=4&&!SW.has(rmAccents(w));});
}

function indColor(v){return v<-DID_THRESH?'#2a9d5c':v>DID_THRESH?'#e63946':'#bbb';}
function indBg(v){return v<-DID_THRESH?'#d1fae5':v>DID_THRESH?'#fee2e2':'#e5e7eb';}
function dimTip(label,v){
  var val=(v>0?'+':'')+(v*100).toFixed(1)+' pp';
  var dir=v<-DID_THRESH?'mejoró':v>DID_THRESH?'empeoró':'sin cambio';
  return label+': '+val+' ('+dir+')';
}

// badgeInfo: compare accent-stripped dir; return CSS class + HTML label
function badgeInfo(dir){
  var d=rmAccents(String(dir||'').toLowerCase().trim());
  if(d==='mejoro')  return ['badge-mejor', '↓ mejoró'];
  if(d==='empeoro') return ['badge-empeor','↑ empeoró'];
  return ['badge-neutro','≈ sin cambio'];
}

function sqrtScale(v,lo,hi){
  if(lo===hi)return(FONT_MIN+FONT_MAX)/2;
  return FONT_MIN+(Math.sqrt(v-lo)/Math.sqrt(hi-lo))*(FONT_MAX-FONT_MIN);
}

  };});

    cve:String(d.cve||''),
    sentimiento:String(d.sentimiento||'neutral').toLowerCase(),
    texto:String(d.texto||'')
  };});
  document.getElementById('cloud-loading').style.display='none';
  buildStateDropdown();
  renderCloud(null);
}

// DROPDOWN
function dimIconHtml(emoji,label,v){
  var val=(v>0?'+':'')+(v*100).toFixed(1)+' pp';
  var dir=v<-DID_THRESH?'mejoró':v>DID_THRESH?'empeoró':'sin cambio';
  var color=v<-DID_THRESH?'#065f46':v>DID_THRESH?'#991b1b':'#4b5563';
  var bg=v<-DID_THRESH?'#d1fae5':v>DID_THRESH?'#fee2e2':'#e5e7eb';
  return '<span class="dim-icon" style="color:'+color+';background:'+bg+'" title="'+label+': '+val+' ('+dir+')">'
    +emoji+' '+label+': '+val+' ('+dir+')</span>';
}
function buildStateDropdown(){
  var sel=document.getElementById('state-select');
  statesData.slice().sort(function(a,b){return a.nom.localeCompare(b.nom,'es');}).forEach(function(s){
    var o=document.createElement('option');
    o.value=s.cve;o.textContent=s.nom;sel.appendChild(o);
  });
  sel.addEventListener('change',function(){
    var cve=sel.value;
    selectState(cve==='__nacional__'?null:statesData.find(function(s){return s.cve===cve;})||null);
  });
}

// SELECTION
function selectState(state){
  activeState=state;
  document.getElementById('state-select').value=state?state.cve:'__nacional__';
  var icons=document.getElementById('dim-icons');
  if(!state){icons.style.display='none';}
  else{
    icons.style.display='flex';
    icons.innerHTML=dimIconHtml('🏥','Salud',state.salud)
      +dimIconHtml('🏠','Vivienda',state.vivienda)
      +dimIconHtml('🍽️','Alimentación',state.alim);
  }
  renderCloud(state);
}

// WORD FREQUENCIES
function computeWords(rows){
  var freq=new Map(),pos=new Map(),neg=new Map(),neu=new Map();
  rows.forEach(function(r){
    if(!r.texto)return;
    tokenize(r.texto).forEach(function(w){
      freq.set(w,(freq.get(w)||0)+1);
      var m=r.sentimiento==='positivo'?pos:r.sentimiento==='negativo'?neg:neu;
      m.set(w,(m.get(w)||0)+1);
    });
  });
  var sorted=Array.from(freq.entries()).filter(function(e){return e[1]>=MIN_WORD_FREQ;}).sort(function(a,b){return b[1]-a[1];}).slice(0,MAX_WORDS);
  if(!sorted.length)return[];
  var hi=sorted[0][1],lo=sorted[sorted.length-1][1];
  return sorted.map(function(e){
    var text=e[0],count=e[1];
    var p=pos.get(text)||0,n=neg.get(text)||0,tot=p+n+(neu.get(text)||0);
    var color=tot>0?(p/tot>0.6?'#2a9d5c':n/tot>0.6?'#e63946':'#888'):'#888';
    return{text:text,count:count,fontSize:Math.round(sqrtScale(count,lo,hi)),color:color};
  });
}

// SPIRAL PLACEMENT (axis-aligned bounding box collision)
function estW(t,fs){return t.length*fs*0.57;}
function placeWords(words,W,H){
  var placed=[],cx=W/2,cy=H/2;
  for(var i=0;i<words.length;i++){
    var w=words[i],ww=estW(w.text,w.fontSize),wh=w.fontSize*1.28;
    var px=cx,py=cy,ok=false;
    for(var t=0;t<700;t++){
      px=cx+t*2.1*Math.cos(t*0.27);
      py=cy+t*2.1*Math.sin(t*0.27)*0.52;
      if(px-ww/2<6||px+ww/2>W-6||py-wh/2<6||py+wh/2>H-6)continue;
      var clash=false;
      for(var j=0;j<placed.length;j++){
        var p=placed[j],pw=estW(p.text,p.fontSize),ph=p.fontSize*1.28;
        if(px+ww/2+3>=p.x-pw/2&&px-ww/2-3<=p.x+pw/2&&py+wh/2+2>=p.y-ph/2&&py-wh/2-2<=p.y+ph/2){clash=true;break;}
      }
      if(!clash){ok=true;break;}
    }
    if(ok)placed.push({text:w.text,count:w.count,fontSize:w.fontSize,color:w.color,x:px,y:py});
  }
  return placed;
}

// RENDER CLOUD
function renderCloud(state){
  var wrap=document.getElementById('cloud-wrap');
  var W=wrap.clientWidth||700,H=wrap.clientHeight||430;
  var rows,title,subtitle;
  if(!state){
    rows=frasesData;
    title='Nacional — todos los comentarios';
    subtitle=frasesData.length.toLocaleString()+' comentarios · todos los estados';
  }else{
    var sr=frasesData.filter(function(r){return r.cve===state.cve;});
    if(sr.length>=MIN_COMMENTS){
      rows=sr;title=state.nom;
      subtitle=sr.length.toLocaleString()+' comentarios en este estado';
    }else{
      rows=frasesData;
      title=state.nom+' — nube nacional';
      subtitle='Solo '+sr.length+' comentario(s). Mínimo: '+MIN_COMMENTS+'. Usando datos nacionales.';
    }
  }
  var placed=placeWords(computeWords(rows),W,H);
  var svg=d3.select('#word-cloud');
  svg.attr('viewBox','0 0 '+W+' '+H).attr('width',W).attr('height',H);
  svg.selectAll('g.cg').transition().duration(120).style('opacity',0).remove();
  var g=svg.append('g').attr('class','cg').style('opacity',0);
  if(!placed.length){
    g.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
     .attr('font-size','14px').attr('fill','#ccc').text('Sin datos suficientes');
  }else{
    placed.forEach(function(w){
      g.append('text')
        .attr('x',w.x).attr('y',w.y).attr('text-anchor','middle')
        .attr('dominant-baseline','central')
        .attr('font-size',w.fontSize+'px')
        .attr('font-family','Arial,Helvetica,sans-serif')
        .attr('font-weight',w.fontSize>=26?700:400)
        .attr('fill',w.color).attr('cursor','default').attr('opacity',.88)
        .text(w.text)
        .append('title').text('"'+w.text+'" — '+w.count+(w.count!==1?' apariciones':' aparición'));
    });
  }
  g.transition().duration(280).style('opacity',1);
}

// RESIZE
var _rt;
new ResizeObserver(function(){
  clearTimeout(_rt);
  _rt=setTimeout(function(){if(statesData.length)renderCloud(activeState);},160);
}).observe(document.getElementById('cloud-wrap'));

loadAll();
</script>
